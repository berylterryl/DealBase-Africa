/* ─── CSS VARIABLES ─── */
:root {
  --green: #083335;
  --gold: #C9A84C;
  --gold-light: #d4b65e;
  --gold-dim: rgba(201,168,76,.08);
  --white: #ffffff;
  --muted: rgba(255,255,255,.45);
  --border: rgba(255,255,255,.06);
  --border-sub: rgba(255,255,255,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--green);
  color: var(--white);
  font-size: 14px;
  overflow-x: hidden;
}

/* ─── LOADING ─── */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p {
  font-size: 14px;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  letter-spacing: .05em;
}

/* ─── PAGE CONTENT (hidden until data loads) ─── */
.page-content { display: none; }
.page-content.loaded { display: block; }

/* ─── TICKER ─── */
.ticker {
  background: rgba(0,0,0,.25);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  height: 36px;
  display: flex;
  align-items: center;
}
.ticker-track {
  display: flex;
  gap: 48px;
  white-space: nowrap;
  animation: ticker 50s linear infinite;
  padding-right: 48px;
}
.ticker-track span {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: rgba(255,255,255,.65);
  letter-spacing: .04em;
}
.ticker-track span::before { content: '▲ '; color: var(--gold); }
@keyframes ticker {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ─── NAV (dark theme, replaces style.css if needed) ─── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  background: rgba(8,51,53,.95);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(8px);
}
.logo-wrap { text-decoration: none; display: flex; flex-direction: column; }
.l1 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--white); font-weight: 600; }
.l2 { font-size: 14px; color: var(--muted); letter-spacing: .10em; text-transform: uppercase; margin-top: 1px; }
.mobile-toggle {
  display: none;
  background: none;
  border: 1px solid var(--border);
  color: var(--white);
  font-size: 18px;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 2px;
}
.nav-links {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 2px;
}
.nav-links a {
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 12px;
  border-radius: 2px;
  transition: color .2s, background .2s;
}
.nav-links a:hover { color: var(--white); background: rgba(255,255,255,.05); }
.nav-links .active-page { color: var(--gold) !important; background: var(--gold-dim) !important; }
.btn-cta {
  background: var(--gold) !important;
  color: var(--green) !important;
  font-weight: 600 !important;
  padding: 7px 16px !important;
  border-radius: 2px !important;
}
.btn-cta:hover { background: var(--gold-light) !important; }

/* ─── PAGE HEADER ─── */
.page-header {
  padding: 72px 80px 56px;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.page-header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,.04) 0%, transparent 70%);
  pointer-events: none;
}
.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 500;
  margin-bottom: 14px;
}
.page-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 5vw, 56px);
  font-weight: 400;
  line-height: 1.1;
  color: var(--white);
  margin-bottom: 16px;
  max-width: 560px;
}
.page-header h1 em { color: var(--gold); font-style: italic; }
.page-header p { font-size: 14px; color: var(--muted); line-height: 1.75; max-width: 520px; }

/* ─── KPI STRIP ─── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  border-bottom: 1px solid var(--border);
}
.kpi {
  padding: 28px 24px;
  border-right: 1px solid var(--border);
  animation: fadeUp .5s ease both;
  position: relative;
}
.kpi:last-child { border-right: none; }
.kpi:nth-child(2) { animation-delay: .06s; }
.kpi:nth-child(3) { animation-delay: .10s; }
.kpi:nth-child(4) { animation-delay: .14s; }
.kpi:nth-child(5) { animation-delay: .17s; }
.kpi:nth-child(6) { animation-delay: .20s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.kpi-num {
  font-family: 'DM Mono', monospace;
  font-size: 26px;
  font-weight: 500;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -.02em;
}
.kpi-label {
  font-size: 14px;
  color: var(--muted);
  font-weight: 400;
  line-height: 1.3;
}
.kpi-tag {
  display: inline-block;
  margin-top: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: rgba(201,168,76,.7);
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,.15);
  padding: 2px 7px;
  border-radius: 2px;
  letter-spacing: .04em;
}

/* ─── SECTION HEADERS ─── */
.section-hd {
  padding: 48px 80px 32px;
}
.section-hd .eyebrow { margin-bottom: 8px; }
.section-hd h2 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 400;
  color: var(--white);
}

/* ─── CHARTS GRID ─── */
.charts-outer {
  padding: 0 80px 0;
}
.charts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 48px;
}
.chart-panel {
  background: var(--green);
  padding: 36px 40px;
  animation: fadeUp .5s ease both;
  position: relative;
}
.chart-panel:nth-child(2) { animation-delay: .08s; }
.chart-panel:nth-child(3) { animation-delay: .13s; }
.chart-panel:nth-child(4) { animation-delay: .17s; }
.chart-panel:nth-child(5) { animation-delay: .21s; }
.chart-panel:nth-child(6) { animation-delay: .25s; }

.panel-label {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(201,168,76,.6);
  font-weight: 500;
  margin-bottom: 4px;
}
.panel-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 4px;
}
.panel-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

.chart-wrap { position: relative; width: 100%; }
.chart-wrap canvas { display: block; }

/* ─── VALUATION MULTIPLES ─── */
.valuation-section {
  padding: 0 80px 48px;
}
.multiples-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-top: 8px;
}
.multiple-card {
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 20px;
  transition: border-color .2s, background .2s;
}
.multiple-card:hover {
  border-color: rgba(201,168,76,.3);
  background: rgba(201,168,76,.04);
}
.mc-target {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 4px;
}
.mc-sector {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 14px;
}
.mc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.mc-stat-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: rgba(255,255,255,.3);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.mc-stat-val {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--gold);
}
.mc-stat-val.dim { color: var(--muted); }

/* ─── TABLE SECTIONS ─── */
.table-section {
  padding: 0 80px 48px;
}
.tbl-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 24px;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 3px;
  width: fit-content;
}
.tab-btn {
  padding: 7px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--muted);
  background: none;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: .01em;
}
.tab-btn.active {
  background: rgba(201,168,76,.12);
  color: var(--gold);
  border: 1px solid rgba(201,168,76,.2);
}
.tab-btn:hover:not(.active) { color: var(--white); }

.tbl-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
}

  font-family: 'DM Mono', monospace;
  font-size: 14px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: rgba(255,255,255,.3);
  font-weight: 500;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
}
thead th.r { text-align: right; }
thead th.c { text-align: center; }

  border-bottom: 1px solid var(--border-sub);
  transition: background .15s;
}

  font-size: 14px;
  vertical-align: middle;
  color: var(--white);
}
tbody td.r { text-align: right; font-family: 'DM Mono', monospace; }
tbody td.c { text-align: center; }
